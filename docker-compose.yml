###############################################################################
# docker-compose.yml — Single EC2 deployment
# Runs frontend (Nginx) + backend (Node.js) + Redis on one EC2 instance
# PostgreSQL is on RDS (external) — connection via DATABASE_URL
###############################################################################

services:

  # ─── Redis — sessions + BullMQ queue ────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: sbi-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy volatile-lru --save ""
    ports:
      - "127.0.0.1:6379:6379"   # bind to loopback only — not exposed externally
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sbi-net

  # ─── Backend — Node.js API + BullMQ worker ───────────────────────────────────
  backend:
    image: ${BACKEND_IMAGE:-sbi-uw-backend:latest}
    container_name: sbi-backend
    restart: unless-stopped
    env_file: .env
    environment:
      - NODE_ENV=production
      - PORT=5000
      - REDIS_URL=redis://redis:6379
    expose:
      - "5000"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - sbi-net

  # ─── Frontend — Nginx serving static files + reverse proxy ──────────────────
  frontend:
    image: ${FRONTEND_IMAGE:-sbi-uw-frontend:latest}
    container_name: sbi-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/login"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - sbi-net

networks:
  sbi-net:
    driver: bridge
