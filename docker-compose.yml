services:

  postgres:
    image: postgres:16-alpine
    container_name: sbi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-sbi_uw}
      POSTGRES_USER: ${DB_USER:-sbi_app}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-sbi_app} -d ${DB_NAME:-sbi_uw}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sbi-net

  redis:
    image: redis:7-alpine
    container_name: sbi-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy noeviction --save ""
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sbi-net

  backend:
    image: ${BACKEND_IMAGE:-sbi-uw-backend:latest}
    container_name: sbi-backend
    restart: unless-stopped
    env_file: .env
    environment:
      - NODE_ENV=production
      - PORT=5000
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://${DB_USER:-sbi_app}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-sbi_uw}
      - NODE_TLS_REJECT_UNAUTHORIZED=0
    expose:
      - "5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - sbi-net

  frontend:
    image: ${FRONTEND_IMAGE:-sbi-uw-frontend:latest}
    container_name: sbi-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/login"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - sbi-net

networks:
  sbi-net:
    driver: bridge

volumes:
  pgdata:
    driver: local
